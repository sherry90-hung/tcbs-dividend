name: Update dividend data

on:
  schedule:
    - cron: '30 0 * * *'    # 每天 UTC 00:30 = 台灣時間 08:30（早上：更新日期、汰除過期標的）
    - cron: '30 10 * * *'   # 每天 UTC 10:30 = 台灣時間 18:30（收盤後：更新最新收盤價與殖利率）
  workflow_dispatch:          # 也可在 Actions 頁手動按「Run workflow」

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取證交所資料，產生 data.json
        run: python fetch_dividend.py

      - name: 有變動才提交 data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update dividend data ($(date -u +%F))"
          git push

      - name: 清 jsDelivr 快取（讓更新立即生效）
        run: curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/data.json" || true
